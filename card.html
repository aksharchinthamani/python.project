<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com"> 
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <title>esyPay</title>
  <link rel="stylesheet" href="payment.css">
</head>
<body>

  <div class="login-card payment-form">
    <h2 class="text-center mb-4" style="view-transition-name: esypay-title;">Fill your card details</h2>
    <form id="paymentForm">
      <div class="mb-3">
        <label class="form-label" for="cardName">Card Holder Name</label>
        <input type="text" id="cardName" class="form-control" placeholder="Enter name" required>
      </div>

      <div class="mb-3">
        <label class="form-label" for="cardNumber">Card Number</label>
        <input type="number" class="form-control" id="cardNumber" placeholder="1234 5678 9012 3456" required>
      </div>

      <div class="mb-3">
        <label class="form-label" for="cvv">CVV</label>
        <input type="password" class="form-control" id="cvv" placeholder="***" required maxlength="3">
      </div>
    </form>

    <button class="payButton" id="save" onclick="save()">Save</button>
    <button class="payButton" onclick="main()">Proceed</button>
  </div>

  <script src="card.js"></script>
  <script src="transitions.js"></script>
</body>
</html>
