<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>esyPay</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="login.css">
  <link rel="preconnect" href="https://fonts.googleapis.com"> 
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
   <div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="login-card">
      <div class="card-header-custom text-center">
        <h2 style="view-transition-name: esypay-title;">esyPay</h2>
        <p> Sign Up</p>
      </div>
    
      <div class="card-body-custom">
        <div class="mb-3">
          <label for="username" class="form-label">Email</label>
          <input type="email" id="userEmail" class="form-control" placeholder="Enter email">
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input type="password" id="userPassword" class="form-control" placeholder="Enter password">
        </div>

        <button class="loginButton" id="button">login</button>
        <button class="loginButton" onclick="navigateWithTransition('index.html')">Back to Sign in</button>
        <p id="Error" class="error-text text-center mt-3"></p>
        <p id="clickError" class="error-text text-center mt-3"></p>
      </div>
    </div>
  </div>

  <script src="login.js"></script> 
  <script src="transitions.js"></script>
</body>
</html>
